name: Daybreak
options:
  bundleIdPrefix: com.eovidiu
settings:
  base:
    DEVELOPMENT_TEAM: HV325Z3W39
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: Apple Development
    PROVISIONING_PROFILE_SPECIFIER: "iOS Team Provisioning Profile: *"
    SWIFT_VERSION: "5.0"
    ENABLE_DEBUG_DYLIB: NO
targets:
  Daybreak:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [Daybreak]
    dependencies:
      - target: DaybreakWidget
      - target: DaybreakShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eovidiu.daybreak
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Daybreak
        CODE_SIGN_ENTITLEMENTS: Daybreak/Daybreak.entitlements
  DaybreakWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources: [DaybreakWidget]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eovidiu.daybreak.widget
        INFOPLIST_FILE: DaybreakWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Daybreak
  DaybreakShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DaybreakShare
      - path: Daybreak/Models.swift
      - path: Daybreak/LocalModels.swift
      - path: Daybreak/SharedStore.swift
      - path: Daybreak/SharedCapture.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eovidiu.daybreak.share
        INFOPLIST_FILE: DaybreakShare/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Daybreak
        CODE_SIGN_ENTITLEMENTS: DaybreakShare/DaybreakShare.entitlements
  DaybreakUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources: [DaybreakUITests]
    dependencies:
      - target: Daybreak
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  DaybreakTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources: [DaybreakTests]
    dependencies:
      - target: Daybreak
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Daybreak:
    build:
      targets:
        Daybreak: all
        DaybreakUITests: [test]
        DaybreakTests: [test]
    test:
      targets: [DaybreakTests, DaybreakUITests]
